<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ code }} — {{ title }}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .error-page {
      min-height: 70vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .error-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,.10);
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .error-code {
      font-size: 80px; font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1; margin-bottom: 8px;
    }
    .error-title { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 12px; }
    .error-msg   { font-size: 15px; color: #64748b; line-height: 1.7; margin-bottom: 28px; }
    .error-icon  { font-size: 48px; margin-bottom: 16px; }
    .error-icon.e404 { color: #f59e0b; }
    .error-icon.e500 { color: #ef4444; }
  </style>
</head>
<body style="background:#f0f4ff;">

<div class="error-page">
  <div class="error-card">
    <div class="error-icon {{ 'e404' if code == 404 else 'e500' }}">
      <i class="fa-solid {{ 'fa-map-location-dot' if code == 404 else 'fa-triangle-exclamation' }}"></i>
    </div>
    <div class="error-code">{{ code }}</div>
    <p class="error-title">{{ title }}</p>
    <p class="error-msg">{{ message }}</p>
    <a href="/" class="btn btn-primary" style="display:inline-flex;gap:8px;align-items:center;text-decoration:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:600;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;">
      <i class="fa-solid fa-house"></i> Kembali ke Beranda
    </a>
  </div>
</div>

</body>
</html>
